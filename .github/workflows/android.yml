name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'Backend API base URL (e.g. https://baby-sign.example.com). Leave empty to use repository variable VITE_API_BASE.'
        required: false
        default: ''

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Install npm deps
        working-directory: frontend
        run: npm ci

      - name: Build Vue app
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ inputs.api_base || vars.VITE_API_BASE }}
        run: |
          echo "Building with VITE_API_BASE='${VITE_API_BASE}'"
          npm run build

      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android
          npx cap sync android

      - name: Add CAMERA permission to AndroidManifest
        working-directory: frontend
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />|' "$MANIFEST"
          fi
          echo "--- AndroidManifest.xml ---"
          cat "$MANIFEST"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        working-directory: frontend
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Found APK: $APK"
          echo "apk_path=frontend/$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baby-sign-helper-debug-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
